name: TypeScript

on:
    workflow_call:
        inputs:
            runs-on:
                description: The type of machine to run the job on.
                type: string
                required: false
                default: ubuntu-latest

            enable-lint:
                description: Enable lint job.
                type: boolean
                required: false
                default: true
            enable-format:
                description: Enable format job.
                type: boolean
                required: false
                default: true
            enable-dependencies:
                description: Enable dependencies job.
                type: boolean
                required: false
                default: true
            enable-test:
                description: Enable test job.
                type: boolean
                required: false
                default: true

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ${{ inputs.runs-on }}
        if: ${{ inputs.enable-lint }}

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 'lts/*'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Check types
              run: npm run check:types

            - name: Lint
              run: npm run lint

    format:
        name: Format
        runs-on: ${{ inputs.runs-on }}
        if: ${{ inputs.enable-format }}

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 'lts/*'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Check formatting
              run: npx prettier --check .

    dependencies:
        name: Dependencies
        runs-on: ${{ inputs.runs-on }}
        if: ${{ inputs.enable-dependencies }}

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 'lts/*'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Check licenses
              run: npm run check:licenses

    test:
        name: Test
        runs-on: ${{ inputs.runs-on }}
        if: ${{ inputs.enable-test }}

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 'lts/*'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Test
              run: npm run test
